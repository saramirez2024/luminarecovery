<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LUMINA Recovery Serum — Print Sheet (30-up)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@200;300;400;500&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

@page {
  size: 8.5in 11in;
  margin: 0;
}

body {
  width: 8.5in;
  height: 11in;
  margin: 0;
  padding: 0;
  background: white;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

.print-instructions {
  position: fixed;
  top: 10px;
  right: 10px;
  background: #333;
  color: #fff;
  padding: 12px 16px;
  border-radius: 6px;
  font-family: sans-serif;
  font-size: 12px;
  line-height: 1.5;
  z-index: 9999;
  max-width: 280px;
}

@media print {
  .print-instructions { display: none; }
}

.sheet {
  width: 8.5in;
  height: 11in;
  padding-top: 0.5in;
  padding-left: 0.1875in;
  display: flex;
  flex-wrap: wrap;
  align-content: flex-start;
}

.label-cell {
  width: 2.625in;
  height: 1in;
  position: relative;
  overflow: hidden;
}

.label-cell:nth-child(3n+2) {
  margin-left: 0.125in;
  margin-right: 0.125in;
}

.label {
  width: 100%;
  height: 100%;
  background: #0d0e10;
  position: relative;
  display: flex;
  overflow: hidden;
}

.label::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 35%;
  width: 0.6in;
  height: 0.6in;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(200,169,110,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.inner-border {
  position: absolute;
  top: 0.033in;
  left: 0.033in;
  right: 0.033in;
  bottom: 0.033in;
  border: 0.5px solid rgba(200,169,110,0.25);
  pointer-events: none;
  z-index: 2;
}

.left-panel {
  width: 65%;
  height: 100%;
  padding: 0.055in 0.06in 0.04in 0.065in;
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 1;
}

.right-panel {
  width: 35%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0.06in 0.05in 0.04in 0;
  position: relative;
  z-index: 1;
}

.brand-name {
  font-family: 'Montserrat', sans-serif;
  font-weight: 200;
  font-size: 5pt;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: #f0ede8;
  margin-bottom: 1pt;
}

.product-name {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-size: 7.5pt;
  color: #f0ede8;
  line-height: 1.1;
  margin-bottom: 1.5pt;
}

.active-ingredient {
  font-family: 'Montserrat', sans-serif;
  font-weight: 400;
  font-size: 4pt;
  color: #c8a96e;
  letter-spacing: 0.06em;
  margin-bottom: 2pt;
}

.gold-line {
  width: 100%;
  height: 0.3pt;
  background: linear-gradient(90deg, #c8a96e, rgba(200,169,110,0.2));
  margin-bottom: 2pt;
}

.meta-line {
  font-family: 'Montserrat', sans-serif;
  font-weight: 300;
  font-size: 3.2pt;
  color: rgba(240,237,232,0.75);
  line-height: 1.45;
  letter-spacing: 0.02em;
}

.meta-line.email {
  font-size: 3pt;
  color: rgba(240,237,232,0.6);
}

.ingredients-block {
  margin-top: auto;
  padding-top: 1.5pt;
}

.ingredients-label {
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  font-size: 3pt;
  color: rgba(240,237,232,0.45);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 0.5pt;
}

.ingredients-text {
  font-family: 'Montserrat', sans-serif;
  font-weight: 300;
  font-size: 3.3pt;
  color: rgba(240,237,232,0.55);
  line-height: 1.35;
  letter-spacing: 0.01em;
}

.qr-container {
  width: 0.72in;
  height: 0.72in;
}

.qr-container svg {
  width: 100%;
  height: 100%;
}

.qr-label {
  font-family: 'Montserrat', sans-serif;
  font-weight: 300;
  font-size: 2.8pt;
  color: rgba(240,237,232,0.5);
  text-align: center;
  margin-top: 2pt;
  letter-spacing: 0.03em;
}
</style>
</head>
<body>

<div class="print-instructions">
  <strong>Print Instructions</strong><br>
  Chrome &rarr; Ctrl+P (Cmd+P)<br>
  Scale: 100% &bull; Margins: None<br>
  Paper: Letter (8.5&times;11)<br>
  Background graphics: ON
</div>

<div class="sheet" id="sheet"></div>

const labelHTML = `
<div class="label">
  <div class="inner-border"></div>
  <div class="left-panel">
    <div class="brand-name">LUMINA</div>
    <div class="product-name">Recovery Serum</div>
    <div class="active-ingredient">GHK-Cu 0.1%</div>
    <div class="gold-line"></div>
    <div class="meta-line">5 mL · Batch 001 · Exp 12/2026</div>

  <div class="right-panel">
    <div class="qr-container">${qrSVG}</div>

const sheet = document.getElementById('sheet');
for (let i = 0; i < 30; i++) {
  const cell = document.createElement('div');
  cell.className = 'label-cell';
  cell.innerHTML = labelHTML;
  sheet.appendChild(cell);
}
</script>
</body>
</html>
